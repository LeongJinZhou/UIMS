# ============================================
# QIU-IMS CI/CD Pipeline
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9.15.0'

jobs:
  # --- TypeScript Lint & Type Check ---
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm lint

  # --- Backend Tests ---
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: typescript
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: qiu_ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/qiu_ims_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: pnpm --filter api test

  # --- Solver Tests ---
  solver-tests:
    name: Solver Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/solver
          pip install -r requirements.txt

      - name: Run solver tests
        run: |
          cd apps/solver
          python -m pytest tests/ -v

  # --- Build ---
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [typescript, api-tests, solver-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build

  # --- Docker Build Validation ---
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t qiu-ims-api:test .

      - name: Build Solver image
        run: docker build -f docker/Dockerfile.solver -t qiu-ims-solver:test .
